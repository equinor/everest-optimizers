name: Run tests

on:
  pull_request:

env:
  ERT_SHOW_BACKTRACE: 1
  UV_SYSTEM_PYTHON: 1
  UV_FROZEN: true         # https://docs.astral.sh/uv/configuration/environment/#uv_frozen

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  tests:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ ubuntu-latest ]
        include:
          - python-version: "3.12"
            os: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          prune-cache: false
          cache-dependency-glob: pyproject.toml
          python-version: "${{ matrix.python-version }}"

      - name: Install build tools (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libegl1 liblapack-dev libblas-dev gfortran
        shell: bash

      - name: Set FC var for macos
        if: matrix.os == 'macos-latest'
        run: |
          echo "FC=/opt/homebrew/bin/gfortran-15" >> $GITHUB_ENV

      - name: Install project with dependencies
        run: uv sync --all-extras --all-groups

      - name: Run tests
        run: uv run pytest tests/
